<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folha de Hora Extra</title>
<style>
  :root{
    --ink:#1f2933;
    --paper:#ffffff;
    --bg:#eef1f4;
    --line:#d6dbe1;
    --accent:#2f5d8a;
    --accent-soft:#e7eef6;
    --muted:#6b7682;
    --field:#f7f9fb;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    display:grid;
    grid-template-columns:340px 1fr;
    gap:28px;
    max-width:1100px;
    margin:0 auto;
    padding:28px 24px 60px;
    align-items:start;
  }

  .panel{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:22px;
    position:sticky;
    top:24px;
    box-shadow:0 1px 2px rgba(31,41,51,.04);
  }
  .panel h1{font-size:18px;margin:0 0 2px;letter-spacing:.2px;}
  .panel .sub{font-size:12.5px;color:var(--muted);margin:0 0 20px;}

  .field{margin-bottom:18px;}
  .field > label{
    display:flex;align-items:center;
    font-size:12px;font-weight:600;text-transform:uppercase;
    letter-spacing:.6px;color:var(--muted);margin-bottom:7px;
  }
  input[type="date"],input[type="text"],input[type="number"]{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    background:var(--field);font-size:14px;color:var(--ink);font-family:inherit;
  }
  input:focus{outline:2px solid var(--accent);outline-offset:0;border-color:var(--accent);}

  /* valor padrão (data de hoje / título automático) */
  input.is-default{color:var(--accent);}

  .badge{
    display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;
    letter-spacing:.5px;color:var(--accent);background:var(--accent-soft);
    padding:2px 8px;border-radius:20px;margin-left:8px;font-style:normal;
  }

  .link-btn{background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;padding:6px 0;font-weight:600;}
  .link-btn:hover{text-decoration:underline;}

  /* opção "uma folha só" */
  .field label.check{
    display:flex;align-items:center;gap:9px;cursor:pointer;
    font-size:13.5px;font-weight:600;text-transform:none;letter-spacing:0;
    color:var(--ink);margin-bottom:6px;
  }
  .field label.check input{
    width:17px;height:17px;accent-color:var(--accent);cursor:pointer;margin:0;flex:none;
  }
  .check-sub{margin:0;font-size:12px;color:var(--muted);padding-left:26px;line-height:1.4;}

  .actions{margin-top:24px;padding-top:20px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px;}
  .btn{
    width:100%;padding:11px 14px;border-radius:9px;border:1px solid transparent;
    font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
    display:flex;align-items:center;justify-content:center;gap:8px;transition:.12s;
  }
  .btn.primary{background:var(--accent);color:#fff;}
  .btn.primary:hover{background:#274d72;}
  .btn.ghost{background:#fff;border-color:var(--line);color:var(--ink);}
  .btn.ghost:hover{background:var(--accent-soft);border-color:var(--accent);}
  .btn svg{width:16px;height:16px;}

  .stage{display:flex;justify-content:center;}
  .sheet{
    background:var(--paper);width:100%;max-width:760px;min-height:1000px;
    padding:70px 64px;border:1px solid var(--line);border-radius:4px;
    box-shadow:0 6px 24px rgba(31,41,51,.10);color:#000;
    font-family:"Calibri","Segoe UI",Arial,sans-serif;
  }
  .doc-title{font-size:28px;font-weight:700;margin:0 0 46px;line-height:1.3;word-break:break-word;text-align:center;}
  .doc-line{height:0;width:68%;border-bottom:2px solid #000;margin:0 auto 46px;}
  .empty-note{color:#b7bfc8;font-size:14px;text-align:center;}

  /* ---------- MODO "UMA FOLHA SÓ" (tela) ---------- */
  .sheet.fit{
    display:flex;
    flex-direction:column;
    height:1040px;
    min-height:1040px;
  }
  .sheet.fit #docLinhas{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  .sheet.fit .doc-line{margin-bottom:0;}
  .sheet.fit .empty-note{margin:auto;}

  .hint{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.5;}

  #toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:9px;font-size:13.5px;
    opacity:0;pointer-events:none;transition:.25s;z-index:50;max-width:90vw;text-align:center;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:820px){
    .wrap{grid-template-columns:1fr;}
    .panel{position:static;}
    .sheet{padding:48px 32px;min-height:auto;}
  }

  @media print{
    @page{size:A4;margin:18mm 16mm;}
    body{background:#fff;}
    .panel,.hint,#toast{display:none !important;}
    .wrap{display:block;padding:0;margin:0;max-width:none;}
    .stage{display:block;}
    .sheet{box-shadow:none;border:none;border-radius:0;max-width:none;width:100%;min-height:auto;padding:0;}
    .doc-title{margin-bottom:40px;}
    .doc-line{margin-bottom:42px;}
    .empty-note{display:none;}

    /* MODO "UMA FOLHA SÓ" (impressão / PDF):
       altura útil da página A4 = 297mm - 18mm - 18mm = 261mm
       usamos 258mm para garantir folga e não pular para uma 2ª folha */
    .sheet.fit{
      height:258mm;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .sheet.fit #docLinhas{
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .sheet.fit .doc-line{margin-bottom:0;}
  }
</style>
</head>
<body>
<div class="wrap">

  <aside class="panel">
    <h1>Folha de Hora Extra</h1>
    <p class="sub">Monte, imprima ou salve sua folha.</p>

    <div class="field">
      <label for="data">Data <span class="badge" id="badgeData">hoje</span></label>
      <input type="text" id="data" class="is-default" inputmode="numeric" maxlength="10" placeholder="DD/MM/AAAA">
    </div>

    <div class="field">
      <label for="titulo">Título <span class="badge" id="badgeTitulo">padrão</span></label>
      <input type="text" id="titulo" class="is-default" placeholder="HORA EXTRA ...">
      <button class="link-btn" id="restaurar">↻ Gerar título a partir da data</button>
    </div>

    <div class="field">
      <label for="linhas">Quantidade de linhas</label>
      <input type="number" id="linhas" value="0" min="0" max="60">
    </div>

    <div class="field">
      <label class="check" for="umaFolha">
        <input type="checkbox" id="umaFolha">
        Caber tudo em uma folha só
      </label>
      <p class="check-sub">Ajusta o espaçamento das linhas para que todas saiam em uma única página.</p>
    </div>

    <div class="actions">
      <button class="btn primary" id="btnImprimir">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir
      </button>
      <button class="btn ghost" id="btnPdf">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Salvar PDF
      </button>
      <button class="btn ghost" id="btnDocx">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
        Salvar DOCX
      </button>
    </div>

    <p class="hint">Para PDF, escolha o destino <b>“Salvar como PDF”</b> na janela de impressão.</p>
  </aside>

  <main class="stage">
    <div class="sheet">
      <h2 class="doc-title" id="docTitulo">HORA EXTRA</h2>
      <div id="docLinhas"></div>
    </div>
  </main>

</div>

<div id="toast"></div>

<script>
/* ====================== DATA / TÍTULO ====================== */
const DIAS = ['DOMINGO','SEGUNDA FEIRA','TERÇA FEIRA','QUARTA FEIRA','QUINTA FEIRA','SEXTA FEIRA','SÁBADO'];
const pad = n => String(n).padStart(2,'0');

const elData    = document.getElementById('data');
const elTitulo  = document.getElementById('titulo');
const elLinhas  = document.getElementById('linhas');
const elUmaFolha= document.getElementById('umaFolha');
const sheetEl   = document.querySelector('.sheet');
const badgeData = document.getElementById('badgeData');
const badgeTit  = document.getElementById('badgeTitulo');
const docTitulo = document.getElementById('docTitulo');
const docLinhas = document.getElementById('docLinhas');

let tituloManual = false;

function hojeBR(){const d=new Date();return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;}
function parseBR(s){
  const m = (s||'').trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{2}|\d{4})$/);
  if(!m) return null;
  let d=+m[1], mo=+m[2], y=+m[3];
  if(y < 100) y += 2000;           // 26 -> 2026
  const dt=new Date(y, mo-1, d);
  if(dt.getFullYear()!==y || dt.getMonth()!==mo-1 || dt.getDate()!==d) return null; // data inválida
  return dt;
}
function mascararData(v){
  const dig = (v||'').replace(/\D/g,'').slice(0,8);   // só números, máx 8
  if(dig.length > 4) return dig.slice(0,2)+'/'+dig.slice(2,4)+'/'+dig.slice(4);
  if(dig.length > 2) return dig.slice(0,2)+'/'+dig.slice(2);
  return dig;
}
function dataCorrente(){return parseBR(elData.value);}   // Date válida ou null
function tituloPadrao(d){return `HORA EXTRA ${pad(d.getDate())}/${pad(d.getMonth()+1)} ${DIAS[d.getDay()]}`;}

function sincronizarTitulo(){
  if(!tituloManual){
    const d = dataCorrente();
    if(d) elTitulo.value = tituloPadrao(d);
    elTitulo.classList.add('is-default');
    badgeTit.style.display = '';
  }
}

function numLinhas(){
  let n = parseInt(elLinhas.value,10);
  if(isNaN(n) || n < 0) n = 0;
  if(n > 60) n = 60;
  return n;
}

function render(){
  const d = dataCorrente();
  docTitulo.textContent = elTitulo.value.trim() || (d ? tituloPadrao(d) : 'HORA EXTRA');
  const n = numLinhas();
  docLinhas.innerHTML = '';
  if(n === 0){
    const p = document.createElement('p');
    p.className = 'empty-note';
    p.textContent = 'Defina a quantidade de linhas no painel ao lado.';
    docLinhas.appendChild(p);
    return;
  }
  for(let i=0;i<n;i++){
    const l = document.createElement('div');
    l.className = 'doc-line';
    docLinhas.appendChild(l);
  }
}

/* ====================== EVENTOS ====================== */
elData.addEventListener('input', ()=>{
  elData.value = mascararData(elData.value);   // 250526 -> 25/05/26
  elData.classList.remove('is-default');   // deixou de ser "hoje"
  badgeData.style.display = 'none';
  sincronizarTitulo();
  render();
});
elTitulo.addEventListener('input', ()=>{
  tituloManual = true;
  elTitulo.classList.remove('is-default');
  badgeTit.style.display = 'none';
  render();
});
elLinhas.addEventListener('input', render);
elUmaFolha.addEventListener('change', ()=>{
  sheetEl.classList.toggle('fit', elUmaFolha.checked);
});
document.getElementById('restaurar').addEventListener('click', ()=>{
  tituloManual = false;
  sincronizarTitulo();
  render();
});

/* ====================== TOAST ====================== */
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ====================== IMPRIMIR / PDF ====================== */
document.getElementById('btnImprimir').addEventListener('click', ()=>window.print());
document.getElementById('btnPdf').addEventListener('click', ()=>{
  toast('Na janela de impressão, escolha "Salvar como PDF"');
  setTimeout(()=>window.print(), 400);
});

/* ====================== GERAR .DOCX (offline) ====================== */
const enc = new TextEncoder();
const u8 = s => enc.encode(s);
const CRC_TABLE = (()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function crc32(arr){let c=0xFFFFFFFF;for(let i=0;i<arr.length;i++)c=CRC_TABLE[(c^arr[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
function concat(parts){let len=0;for(const p of parts)len+=p.length;const out=new Uint8Array(len);let o=0;for(const p of parts){out.set(p,o);o+=p.length;}return out;}
const w16=n=>new Uint8Array([n&0xFF,(n>>8)&0xFF]);
const w32=n=>new Uint8Array([n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF]);
function zipStore(files){
  const locals=[]; const central=[]; let offset=0;
  for(const f of files){
    const name=u8(f.name); const data=f.data; const crc=crc32(data); const size=data.length;
    const lh=concat([w32(0x04034b50),w16(20),w16(0),w16(0),w16(0),w16(0),w32(crc),w32(size),w32(size),w16(name.length),w16(0),name,data]);
    locals.push(lh);
    central.push(concat([w32(0x02014b50),w16(20),w16(20),w16(0),w16(0),w16(0),w16(0),w32(crc),w32(size),w32(size),w16(name.length),w16(0),w16(0),w16(0),w16(0),w32(0),w32(offset),name]));
    offset+=lh.length;
  }
  const cd=concat(central); const cdStart=offset;
  const end=concat([w32(0x06054b50),w16(0),w16(0),w16(files.length),w16(files.length),w32(cd.length),w32(cdStart),w16(0)]);
  return concat([...locals, cd, end]);
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function gerarDocx(){
  const d = dataCorrente();
  const titulo = (elTitulo.value.trim() || (d ? tituloPadrao(d) : 'HORA EXTRA'));
  const n = numLinhas();
  const fit = elUmaFolha.checked;
  const sublinhado = '_'.repeat(28);
  const fonte = '<w:rFonts w:ascii="Calibri" w:hAnsi="Calibri"/>';

  let corpo = '';

  if(fit && n > 0){
    /* ---- MODO "UMA FOLHA SÓ" ----
       Altura útil A4 (twips) = 16838 - 1134 (sup) - 1134 (inf), com folga de segurança.
       Distribui título + linhas em "fatias" (slots) de altura fixa para preencher 1 página.
       A fonte permanece em 14pt e só diminui se houver muitas linhas. */
    const util = 16838 - 1134 - 1134 - 280;   // folga de ~0,5cm
    const fatorTitulo = 1.6;                   // o título ocupa ~1,6 "linhas"
    const slot       = Math.floor(util / (n + fatorTitulo));
    const slotTitulo = Math.floor(slot * fatorTitulo);
    // tamanhos de fonte (meio-pontos), travados para não "cortar" o sublinhado
    const szLinha  = Math.max(14, Math.min(28, Math.round((slot/20)/1.45*2)));
    const szTitulo = Math.max(20, Math.min(32, Math.round((slotTitulo/20)/1.45*2)));

    corpo += `<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="0" w:after="0" w:line="${slotTitulo}" w:lineRule="exact"/></w:pPr>`+
             `<w:r><w:rPr>${fonte}<w:b/><w:sz w:val="${szTitulo}"/></w:rPr><w:t xml:space="preserve">${esc(titulo)}</w:t></w:r></w:p>`;
    for(let i=0;i<n;i++){
      corpo += `<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="0" w:after="0" w:line="${slot}" w:lineRule="exact"/></w:pPr>`+
               `<w:r><w:rPr>${fonte}<w:sz w:val="${szLinha}"/></w:rPr><w:t xml:space="preserve">${sublinhado}</w:t></w:r></w:p>`;
    }
  } else {
    /* ---- COMPORTAMENTO PADRÃO (espaçamento fixo de 23pt) ---- */
    corpo += `<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="0" w:after="460" w:line="240" w:lineRule="auto"/></w:pPr>`+
             `<w:r><w:rPr>${fonte}<w:b/><w:sz w:val="32"/></w:rPr><w:t xml:space="preserve">${esc(titulo)}</w:t></w:r></w:p>`;
    for(let i=0;i<n;i++){
      corpo += `<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="0" w:after="460" w:line="240" w:lineRule="auto"/></w:pPr>`+
               `<w:r><w:rPr>${fonte}<w:sz w:val="28"/></w:rPr><w:t xml:space="preserve">${sublinhado}</w:t></w:r></w:p>`;
    }
  }

  const documentXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>${corpo}<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134" w:header="720" w:footer="720" w:gutter="0"/></w:sectPr></w:body></w:document>`;

  const contentTypes =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>`;

  const rels =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`;

  const zip = zipStore([
    {name:'[Content_Types].xml', data:u8(contentTypes)},
    {name:'_rels/.rels',          data:u8(rels)},
    {name:'word/document.xml',    data:u8(documentXml)},
  ]);

  const blob = new Blob([zip], {type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const nome = titulo.replace(/[\\/:*?"<>|]/g,'').replace(/\s+/g,'_').slice(0,60) || 'hora_extra';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = nome + '.docx';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  toast('Arquivo .docx gerado');
}
document.getElementById('btnDocx').addEventListener('click', gerarDocx);

/* ====================== INÍCIO ====================== */
elData.value = hojeBR();       // mostra a data de hoje (marcada como padrão)
elData.classList.add('is-default');
sincronizarTitulo();           // título padrão do dia (marcado como padrão)
render();                      // linhas começam em 0
</script>
</body>
</html>
